<a [routerLink]="['/anime', anime.id]" class="group block bg-[#111] border border-white/5 hover:border-amber-400/30 transition-all duration-300 overflow-hidden">
  <div class="relative overflow-hidden">
    <img
      [src]="anime.imageUrl || 'https://placehold.co/300x420/111/222?text=?'"
      [alt]="anime.title"
      class="w-full h-64 object-cover transition-transform duration-500 group-hover:scale-105 opacity-90 group-hover:opacity-100"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
    <div class="absolute bottom-3 left-3 right-3">
      <div class="flex items-center justify-between">
        <span class="text-amber-400 text-xs font-semibold">⭐ {{ anime.malRating | number:'1.1-1' }}</span>
        <span class="text-white/50 text-xs">{{ anime.releaseDate | date:'yyyy' }}</span>
      </div>
    </div>
  </div>
  <div class="p-3 border-t border-white/5">
    <h3 class="text-white font-medium text-sm truncate leading-snug">{{ anime.title }}</h3>
    <p class="text-white/40 text-xs mt-1 truncate">{{ anime.genre }}</p>
  </div>
</a>
